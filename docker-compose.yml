# Docker Compose for LangGraph Web Search Agent
# Use this for local development and testing

services:
  web-search-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-search-agent
    ports:
      - "8000:8000"
    environment:
      - SEARXNG_URL=http://192.168.0.100:8089
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=true
    restart: unless-stopped
