# Docker Compose for LangGraph Web Search Agent
# Use this for local development and testing

services:
  web-search-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-search-agent
    ports:
      - "8000:8000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=true
    depends_on:
      searxng:
        condition: service_healthy
    networks:
      - langgraph-network
    restart: unless-stopped

  # SearXNG instance for testing
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8089:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8089/
    volumes:
      - ./searxng_settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - langgraph-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  langgraph-network:
    driver: bridge
