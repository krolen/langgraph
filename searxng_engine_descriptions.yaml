# SearXNG Engines with Descriptions
# Organized by category for LLM general questions and programming

## SEARCH

- **google**
  - Description: Primary general web search engine with comprehensive coverage
  - Best for: general queries, web search, everything
  - Website: https://www.google.com

- **duckduckgo**
  - Description: Privacy-focused search engine that doesn't track users
  - Best for: privacy-focused search, general queries, no tracking
  - Website: https://duckduckgo.com

- **startpage**
  - Description: Google search results with privacy protection
  - Best for: Google quality without tracking, privacy search
  - Website: https://startpage.com

- **bing**
  - Description: Microsoft's search engine with good web coverage
  - Best for: general search, alternative to Google
  - Website: https://www.bing.com

- **brave**
  - Description: Privacy-focused search with independent index
  - Best for: privacy search, fast results, independent index
  - Website: https://search.brave.com

- **qwant**
  - Description: European privacy-focused search engine
  - Best for: European privacy search, general queries
  - Website: https://www.qwant.com

## KNOWLEDGE

- **wikipedia**
  - Description: Free online encyclopedia with comprehensive articles
  - Best for: encyclopedic knowledge, definitions, general facts, background info
  - Website: https://www.wikipedia.org

- **wikidata**
  - Description: Structured knowledge base powering Wikipedia's data
  - Best for: structured data, entities, knowledge graphs, facts
  - Website: https://wikidata.org

- **openlibrary**
  - Description: Free digital library of books
  - Best for: books, literature, author information, bibliography
  - Website: https://openlibrary.org

## ACADEMIC

- **arxiv**
  - Description: Preprint server for physics, mathematics, computer science
  - Best for: CS papers, physics, math, research papers, AI/ML research
  - Website: https://arxiv.org

- **google_scholar**
  - Description: Search engine for scholarly literature
  - Best for: academic papers, citations, research, scholarly articles
  - Website: https://scholar.google.com

- **semantic_scholar**
  - Description: AI-powered research tool from Allen Institute
  - Best for: academic papers, CS research, citation analysis
  - Website: https://www.semanticscholar.org

- **pubmed**
  - Description: Database of biomedical and life sciences articles
  - Best for: medical research, biology, health sciences, scientific papers
  - Website: https://pubmed.ncbi.nlm.nih.gov

- **crossref**
  - Description: Scholarly content metadata database
  - Best for: academic papers, research metadata, citations
  - Website: https://www.crossref.org

- **openalex**
  - Description: Open catalog of scholarly research
  - Best for: research papers, academic metadata, scholarly content
  - Website: https://openalex.org

